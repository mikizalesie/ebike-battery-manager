<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A84FF">
<title>eBike Battery Manager PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
 --bg:#0b1220;
 --card:#162033;
 --card2:#1d2a44;
 --primary:#0A84FF;
 --success:#22C55E;
 --text:#F8FAFC;
 --text2:#94A3B8;
 --border:#2b3a55;
}

*{box-sizing:border-box}

body{
 margin:0;
 padding:20px;
 background:var(--bg);
 color:var(--text);
 font-family:Segoe UI,Arial,sans-serif;
}

.card{
 background:var(--card);
 border:1px solid var(--border);
 border-radius:20px;
 padding:18px;
 margin-bottom:18px;
 box-shadow:0 8px 20px rgba(0,0,0,.35);
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:16px;
}

button{
 background:linear-gradient(135deg,#0A84FF,#2563EB);
 color:white;
 border:none;
 border-radius:12px;
 padding:12px 16px;
 cursor:pointer;
 font-weight:600;
box-shadow:0 4px 12px rgba(10,132,255,.3);
}

input,select{
 width:100%;
 background:var(--card2);
 color:white;
 border:1px solid var(--border);
 border-radius:12px;
 padding:12px;
 margin-top:6px;
}

table{
 width:100%;
 border-collapse:collapse;
}

th{
 background:#22314d;
}

td,th{
 border:1px solid var(--border);
 padding:10px;
}

canvas{
 background:white;
 border-radius:12px;
 padding:10px;
}

.nav{
 display:flex;
 gap:10px;
 flex-wrap:wrap;
 margin-bottom:20px;

background:#162033;
 border-top:1px solid #2b3a55;

 display:flex;
 justify-content:space-around;

 padding:10px;

 z-index:999;
}

.hero{
 background:linear-gradient(
 135deg,
 #0A84FF,
 #2563EB
 );

button:hover{
 transform:translateY(-2px);
}

 border-radius:24px;
 padding:25px;
 margin-bottom:20px;

 display:flex;
 justify-content:space-between;
 align-items:center;
 flex-wrap:wrap;
}

.hero-title{
 font-size:30px;
 font-weight:bold;
}

.hero-sub{
 opacity:.8;
 margin-top:5px;
}

.hero-battery{
 font-size:80px;
}

.statCard{
 text-align:center;
 transition:.2s;
}

.statCard:hover{
 transform:translateY(-3px);
}

.batteryCard{
 background:linear-gradient(
 135deg,
 #162033,
 #22314d
 );
}

.bottomNav{
 position:fixed;
 bottom:0;
 left:0;
 right:0;

 background:#162033;
 border-top:1px solid #2b3a55;

 display:flex;
 justify-content:space-around;

 padding:10px;

 z-index:999;
}

.bottomNav button{
 flex:1;
 margin:0 4px;

 background:none;
 border:none;

 color:white;

 font-size:14px;
}

body{
 padding-bottom:90px;
}

.card{
 transition:.2s;
}

.card:hover{
 transform:translateY(-2px);
}


.appHeader{
 display:flex;
 align-items:center;
 gap:20px;
 margin-bottom:20px;
}

.appLogo{
 width:90px;
 height:90px;
 border-radius:20px;
 object-fit:cover;
 box-shadow:0 0 20px rgba(10,132,255,.5);
}

.appHeader h1{
 margin:0;
}

.subtitle{
 color:#94A3B8;
 margin-top:6px;
}


</style>
</head>
<body>

<div style="color:red;font-size:30px">
VERSION TEST 05/07/2026 5
</div>


<div class="card">

<div class="appHeader">

<img src="assets/logo.png" class="appLogo">

<div>
<h1>eBike Battery Manager PRO</h1>

<div class="subtitle">
Battery Analytics & Lifecycle Tracking
</div>
</div>

</div>

<div id="userPanel" style="margin-top:15px;">
    <button onclick="loginGoogle()">
        👤 Zaloguj przez Google
    </button>
</div>

<div class="nav">
<button onclick="showPage('dashboard')">🏠 Dashboard</button>
<button onclick="showPage('history')">📋 Historia</button>
<button onclick="showPage('admin')">⚙️ Administracja</button>
</div>

</div>

<div id="dashboardPage">



<div id="heroStats"></div>
<div class="grid" id="kpis"></div>

<div class="card">
<h2>Dodaj przejazd</h2>
<select id="rideBattery"></select>
<input id="rideOdo" type="number" placeholder="Aktualny ODO">
<button onclick="addRide()">Zapisz przejazd</button>
</div>

<div class="card">
<h2>Dodaj ładowanie</h2>

<div style="margin-bottom:12px">
<label><b>Bateria</b></label><br>
<select id="chargeBattery"></select>
</div>

<div style="margin-bottom:12px">
<label><b>Przed ładowaniem</b></label><br>
<select id="before"></select>
</div>

<div style="margin-bottom:12px">
<label><b>Po ładowaniu</b></label><br>
<select id="after"></select>
</div>

<button onclick="addCharge()">Zapisz ładowanie</button>
</div>

<div class="grid" id="stats"></div>

<div class="card"><h2>Przebieg baterii</h2><canvas id="kmChart"></canvas></div>
<div class="card"><h2>Cykle ładowania</h2><canvas id="cycleChart"></canvas></div>
<div class="card"><h2>Km / cykl</h2><canvas id="effChart"></canvas></div>

</div><div id="historyPage" style="display:none"><div class="card">
<h2>Historia przejazdów</h2>
<table id="rides"></table>
</div>

<div class="card">
<h2>Historia ładowań</h2>
<table id="charges"></table>
</div>

</div></div><div id="adminPage" style="display:none"><div class="card">
<button onclick="unlockConfig()">🔓 Konfiguracja (PIN)</button>
<div id="cfg" style="display:none">
ODO początkowe: <input id="startOdo" type="number">
Liczba baterii:
<select id="batteryCount"><option>1</option><option>2</option><option>3</option><option>4</option></select>
<div id="batteryConfigForms"></div>
<button onclick="saveConfig()">Zapisz</button>
</div>
</div><div class="card"><h2>Administracja</h2>
<button onclick="exportData()">💾 Eksport danych</button>
<button onclick="document.getElementById('importFile').click()">📂 Import danych</button>
<input id="importFile" type="file" accept=".json" style="display:none" onchange="importData(event)">
<button onclick="resetApp()">🗑 Reset aplikacji</button>
</div>

</div>
<script>
let db=JSON.parse(localStorage.getItem('ebike_v5'))||{
 
 startOdo:null,
 batteries:[
 {
   name:'Bateria 1',
   manufacturer:'',
   model:'',
   serialNumber:'',
   capacityWh:500,
   startCycles:0
 },
 {
   name:'Bateria 2',
   manufacturer:'',
   model:'',
   serialNumber:'',
   capacityWh:500,
   startCycles:0
 }
],
 rides:[],
 charges:[]
};

async function save(){

alert("NOWA SAVE");

  console.log("SAVE CALLED");

  localStorage.setItem(
    'ebike_v5',
    JSON.stringify(db)
  );

  await syncToCloud();



  render();

}

function fillBars(){
 let h='<option value="">wybierz</option>';
 for(let i=0;i<=10;i++) h+=`<option value="${i}">${i}/10</option>`;
 before.innerHTML=h; after.innerHTML=h;
}
fillBars();

function unlockConfig(){

    if(
        window.currentUser &&
        window.currentUser.email === "michal.mikinka@gmail.com"
    ){
        cfg.style.display='block';
    }else{
        alert("Brak uprawnień administratora");
    }

}


function createBattery(index){
 return {
   name:'Bateria '+(index+1),
   manufacturer:'',
   model:'',
   serialNumber:'',
   capacityWh:500,
   startCycles:0
 };
}



function saveConfig(){

 db.startOdo = Number(startOdo.value);

 let cnt = Number(batteryCount.value);

 while(db.batteries.length < cnt){
   db.batteries.push(createBattery(db.batteries.length));
 }

 db.batteries = db.batteries.slice(0,cnt);

 db.batteries.forEach((b,i)=>{

   const name = document.getElementById('batName_'+i);
   const manufacturer = document.getElementById('batManufacturer_'+i);
   const model = document.getElementById('batModel_'+i);
   const serial = document.getElementById('batSerial_'+i);
   const capacity = document.getElementById('batCapacity_'+i);
   const cycles = document.getElementById('batCycles_'+i);

   if(name) b.name = name.value;
   if(manufacturer) b.manufacturer = manufacturer.value;
   if(model) b.model = model.value;
   if(serial) b.serialNumber = serial.value;
   if(capacity) b.capacityWh = Number(capacity.value);
   if(cycles) b.startCycles = Number(cycles.value);

 });

 save();

 if(document.getElementById('cfg')){
   document.getElementById('cfg').style.display='none';
 }

}

function addRide(){
 const odo=Number(rideOdo.value);
 const bat=Number(rideBattery.value);
 let dist=0;

 if(db.rides.length===0){
   dist=(db.startOdo!==null)?Math.max(0,odo-db.startOdo):0;
   if(db.startOdo===null) db.startOdo=odo;
 } else {
   dist=Math.max(0,odo-db.rides[db.rides.length-1].odo);
 }

 db.rides.push({date:new Date().toLocaleString(),battery:bat,odo,distance:dist});
 save();
}

function addCharge(){
 const b=before.value;
 const a=after.value;

 if(b==='' || a==='') return alert('Wybierz stan przed i po ładowaniu');

 const beforeVal=Number(b);
 const afterVal=Number(a);

 if(afterVal<=beforeVal) return alert('Stan po ładowaniu musi być większy');

 db.charges.push({
   date:new Date().toLocaleString(),
   battery:Number(chargeBattery.value),
   cycle:(afterVal-beforeVal)/10
 });
 save();
}

function batteryKm(id){return db.rides.filter(r=>r.battery===id).reduce((s,r)=>s+r.distance,0);}
function batteryCycles(id){return db.batteries[id].startCycles+db.charges.filter(c=>c.battery===id).reduce((s,c)=>s+c.cycle,0);}

function exportData(){
 const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='ebike_backup.json';
 a.click();
}

function importData(e){
 const f=e.target.files[0]; if(!f) return;
 const r=new FileReader();
 r.onload=x=>{db=JSON.parse(x.target.result);save();};
 r.readAsText(f);
}

async function resetApp(){

 const confirmReset = confirm(
   'Czy na pewno chcesz zresetować aplikację?\n\n' +
   'Ta operacja usunie wszystkie dane:\n' +
   '- historię przejazdów,\n' +
   '- historię ładowań,\n' +
   '- przebieg baterii,\n' +
   '- cykle ładowania.\n\n' +
   'Tych danych nie będzie można odzyskać.'
 );

 if(!confirmReset) return;

 const currentPin = db.pin;

 db = {
   pin: currentPin,
   startOdo: 0,
   batteries: [
     {name:'Bateria 1', startCycles:0},
     {name:'Bateria 2', startCycles:0}
   ],
   rides: [],
   charges: []
 };

 localStorage.setItem('ebike_v5', JSON.stringify(db));

 if(typeof window.syncToCloud === 'function'){
   await window.syncToCloud();
 }

 render();

 alert('Aplikacja została zresetowana.');
}

let kmChart,cycleChart,effChart;

function renderBatteryConfigForms(){
 if(!document.getElementById('batteryConfigForms')) return;

 let html = '';

 db.batteries.forEach((b,i)=>{
   html += `
   <div class="card batteryCard" style="margin-top:15px">
     <h3>🔋 Bateria ${i+1}</h3>

     <label>Nazwa baterii</label>
     <input id="batName_${i}" value="${b.name || ''}">

     <label>Producent</label>
     <input id="batManufacturer_${i}" value="${b.manufacturer || ''}" placeholder="np. Bosch, Yamaha, Shimano">

     <label>Model</label>
     <input id="batModel_${i}" value="${b.model || ''}" placeholder="np. PowerTube 625">

     <label>Numer seryjny</label>
     <input id="batSerial_${i}" value="${b.serialNumber || ''}" placeholder="SN">

     <label>Pojemność [Wh]</label>
     <input id="batCapacity_${i}" type="number" value="${b.capacityWh || 500}">

     <label>Początkowa liczba cykli</label>
     <input id="batCycles_${i}" type="number" step="0.1" value="${b.startCycles || 0}">
   </div>`;
 });

 batteryConfigForms.innerHTML = html;
}

function render(){
 startOdo.value=db.startOdo??'';
 batteryCount.value=db.batteries.length;

 const rb=rideBattery.value, cb=chargeBattery.value;

 let opts='', labels=[], kms=[], cyc=[], eff=[];
 let statsHtml='';
 let totalKm=0,totalCycles=0,maxKm=0,maxIdx=0,maxEff=0,maxEffIdx=0;

 db.batteries.forEach((b,i)=>{
   opts+=`<option value="${i}">${b.name}</option>`;
   const km=batteryKm(i);
   const cy=batteryCycles(i);
   const ef=cy>0?km/cy:0;

   totalKm+=km; totalCycles+=cy;
   if(km>maxKm){maxKm=km;maxIdx=i;}
   if(ef>maxEff){maxEff=ef;maxEffIdx=i;}

   labels.push(b.name); kms.push(km); cyc.push(cy); eff.push(ef);

  statsHtml+=`
<div class="card batteryCard">

<h3>🔋 ${b.name}</h3>

<div style="color:#94A3B8;margin-bottom:10px">
${b.manufacturer || 'Producent nieuzupełniony'} 
${b.model || ''}
</div>

<div style="font-size:13px;color:#94A3B8;margin-bottom:10px">
SN: ${b.serialNumber || '-'}<br>
Pojemność: ${b.capacityWh || '-'} Wh
</div>

<hr style="border:0;border-top:1px solid #2b3a55;margin:12px 0">

<b>Przebieg:</b> ${km.toFixed(1)} km<br>
<b>Cykle:</b> ${cy.toFixed(2)}<br>
<b>Km/cykl:</b> ${ef.toFixed(1)}

</div>`;


 });

 rideBattery.innerHTML=opts;
 chargeBattery.innerHTML=opts;
 if(rb!=='') rideBattery.value=rb;
 if(cb!=='') chargeBattery.value=cb;

 stats.innerHTML=statsHtml;

document.getElementById("heroStats").innerHTML = "";


 kpis.innerHTML=`
<div class="card">
 <div style="font-size:28px">🚴</div>
 <div style="font-size:32px;font-weight:bold;color:#0A84FF">
 ${totalKm.toFixed(0)}
 </div>
 <div>Łączny przebieg (km)</div>
</div>

<div class="card">
 <div style="font-size:28px">🔄</div>
 <div style="font-size:32px;font-weight:bold;color:#0A84FF">
 ${totalCycles.toFixed(1)}
 </div>
 <div>Łączne cykle</div>
</div>

<div class="card">
 <div style="font-size:28px">🔋</div>
 <div style="font-size:22px;font-weight:bold">
 ${db.batteries[maxIdx]?.name||'-'}
 </div>
 <div>Najczęściej używana</div>
</div>

<div class="card">
 <div style="font-size:28px">⚡</div>
 <div style="font-size:22px;font-weight:bold">
 ${db.batteries[maxEffIdx]?.name||'-'}
 </div>
 <div>Najwydajniejsza</div>
</div>`;

 rides.innerHTML='<tr><th>Data</th><th>Bateria</th><th>ODO</th><th>Dystans</th></tr>';
 [...db.rides].reverse().forEach(r=>rides.innerHTML+=`<tr><td>${r.date}</td><td>${db.batteries[r.battery].name}</td><td>${r.odo}</td><td>${r.distance}</td></tr>`);

 charges.innerHTML='<tr><th>Data</th><th>Bateria</th><th>Cykl</th></tr>';
 [...db.charges].reverse().forEach(c=>charges.innerHTML+=`<tr><td>${c.date}</td><td>${db.batteries[c.battery].name}</td><td>${c.cycle.toFixed(2)}</td></tr>`);

 if(kmChart) kmChart.destroy();
 if(cycleChart) cycleChart.destroy();
 if(effChart) effChart.destroy();

 kmChart=new Chart(document.getElementById('kmChart'),{type:'bar',data:{labels,datasets:[{label:'km',data:kms}]}});
 cycleChart=new Chart(document.getElementById('cycleChart'),{type:'bar',data:{labels,datasets:[{label:'cykle',data:cyc}]}});
 effChart=new Chart(document.getElementById('effChart'),{type:'bar',data:{labels,datasets:[{label:'km/cykl',data:eff}]}});
renderBatteryConfigForms();
}
render();
</script>

</div>
<script>
function showPage(page){
 document.getElementById('dashboardPage').style.display = (page==='dashboard') ? 'block' : 'none';
 document.getElementById('historyPage').style.display = (page==='history') ? 'block' : 'none';
 document.getElementById('adminPage').style.display = (page==='admin') ? 'block' : 'none';
}
</script>
