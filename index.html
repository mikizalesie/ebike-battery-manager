function addRide(){
 const odo=Number(rideOdo.value);
 const bat=Number(rideBattery.value);
 let dist=0;

 if(db.rides.length===0){
   dist=(db.startOdo!==null)?Math.max(0,odo-db.startOdo):0;
   if(db.startOdo===null) db.startOdo=odo;
 } else {
   dist=Math.max(0,odo-db.rides[db.rides.length-1].odo);
 }

 db.rides.push({date:new Date().toLocaleString(),battery:bat,odo,distance:dist});
 save();
}

function addCharge(){
 const b=before.value;
 const a=after.value;

 if(b==='' || a==='') return alert('Wybierz stan przed i po ładowaniu');

 const beforeVal=Number(b);
 const afterVal=Number(a);

 if(afterVal<=beforeVal) return alert('Stan po ładowaniu musi być większy');

db.charges.push({
   date:new Date().toLocaleString(),
   battery:Number(chargeBattery.value),
   before: beforeVal,
   after: afterVal,
   cycle:(afterVal-beforeVal)/10
});
 save();
}

function batteryKm(id){return db.rides.filter(r=>r.battery===id).reduce((s,r)=>s+r.distance,0);}
function batteryCycles(id){return db.batteries[id].startCycles+db.charges.filter(c=>c.battery===id).reduce((s,c)=>s+c.cycle,0);}

function exportData(){
 const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='ebike_backup.json';
 a.click();
}

function importData(e){
 const f=e.target.files[0]; if(!f) return;
 const r=new FileReader();
 r.onload=x=>{db=JSON.parse(x.target.result);save();};
 r.readAsText(f);
}

function calculateBatteryHealth(index){

 const b = db.batteries[index] || {};

 const km = batteryKm(index);
 const cy = batteryCycles(index);
 const ef = cy > 0 ? km / cy : 0;

 const batteryCharges = db.charges.filter(c => Number(c.battery) === index);
 const batteryRides = db.rides.filter(r => Number(r.battery) === index);

 // 1. Liczba cykli — łagodna kara, bez sztywnego końca życia baterii
 const cycleScore = Math.max(60, 100 - Math.min(40, cy * 0.04));

 // 2. Średni km / cykl
 // Jeśli nie ma punktu odniesienia, nie karzemy baterii
 const referenceEfficiency = b.referenceKmPerCycle || ef || 0;

 let efficiencyScore = 100;

 if(referenceEfficiency > 0 && ef > 0){
   efficiencyScore = Math.min(100, (ef / referenceEfficiency) * 100);
 }

 // 3. Głębokość ładowań
 // Dużo ładowań od bardzo niskiego poziomu do pełna delikatnie obniża wynik
 let chargeDepthScore = 100;

 if(batteryCharges.length > 0){

   let deepCharges = batteryCharges.filter(c =>
     Number(c.before) <= 2 && Number(c.after) >= 9
   ).length;

   let deepChargeRatio = deepCharges / batteryCharges.length;

   chargeDepthScore = Math.max(70, 100 - deepChargeRatio * 20);
 }

 // 4. Trend wydajności
 // Na razie delikatny wskaźnik — działa sensownie dopiero przy większej historii
 let trendScore = 100;

 if(batteryRides.length >= 6){

   const firstRides = batteryRides.slice(0, 3);
   const lastRides = batteryRides.slice(-3);

   const firstAvg = firstRides.reduce((s,r)=>s + Number(r.distance || 0),0) / firstRides.length;
   const lastAvg = lastRides.reduce((s,r)=>s + Number(r.distance || 0),0) / lastRides.length;

   if(firstAvg > 0 && lastAvg > 0){
     trendScore = Math.min(100, (lastAvg / firstAvg) * 100);
   }
 }

 // 5. Wiek baterii
 // Jeśli nie wpiszemy daty zakupu, ten element nie obniża wyniku
 let ageScore = 100;

 if(b.purchaseDate){
   const purchase = new Date(b.purchaseDate);
   const now = new Date();

   if(!isNaN(purchase.getTime())){
     const ageYears = (now - purchase) / (1000 * 60 * 60 * 24 * 365);
     ageScore = Math.max(70, 100 - ageYears * 5);
   }
 }

 const health =
   cycleScore * 0.35 +
   efficiencyScore * 0.25 +
   chargeDepthScore * 0.15 +
   trendScore * 0.15 +
   ageScore * 0.10;

 const healthText =
   health >= 95 ? 'Bardzo dobra' :
   health >= 85 ? 'Dobra' :
   health >= 75 ? 'Średnia' :
   'Zalecana kontrola';

 return {
   health,
   healthText,
   cycleScore,
   efficiencyScore,
   chargeDepthScore,
   trendScore,
   ageScore
 };
}

function formatBatteryDate(dateStr){
 if(!dateStr) return '-';

 const d = new Date(dateStr);

 if(isNaN(d.getTime())) return '-';

 return d.toLocaleDateString('pl-PL');
}

function batteryAgeText(dateStr){
 if(!dateStr) return '-';

 const d = new Date(dateStr);
 const now = new Date();

 if(isNaN(d.getTime())) return '-';

 const diffDays = Math.floor((now - d) / (1000 * 60 * 60 * 24));
 const years = Math.floor(diffDays / 365);
 const months = Math.floor((diffDays % 365) / 30);

 if(years <= 0 && months <= 0) return 'poniżej 1 miesiąca';
 if(years <= 0) return months + ' mies.';
 if(months <= 0) return years + ' lat';

 return years + ' lat ' + months + ' mies.';
}
